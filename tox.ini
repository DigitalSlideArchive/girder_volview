[tox]
envlist =
    lint,
    test

[testenv]
basepython = python3

[testenv:test]
deps =
    pytest
    # Parallel test execution, opt-in via `tox -e test -- -n auto`. Safe under
    # pytest-girder because each test gets a uniquely-named database.
    pytest-xdist
    # Pin to the girder-3 line: unpinned pulls pytest-girder 5.x (built for
    # girder 5, references girder.plugin._pluginStaticContent) which errors
    # against the installed girder 3.2.x. Requires a MongoDB at localhost:27017.
    pytest-girder<4
    # Opt-in live e2e (tests/test_end_to_end_live.py, VOLVIEW_E2E=1): drives the
    # real dsa stack over REST and synthesizes input volumes. The module
    # self-skips unless the stack is up.
    girder-client
    numpy
    pydicom
    # The conformance kit's validator. A DECLARED dep (not merely transitive) so a
    # missing jsonschema FAILS the conformance tests loudly rather than letting
    # them silently self-skip.
    jsonschema
commands =
    pytest {posargs}
commands_pre =
    python -c 'import os, tarfile; package = os.environ["TOX_PACKAGE"]; members = tarfile.open(package).getnames(); forbidden = [name for name in members if "/node_modules/" in name]; assert not forbidden, f"{package} contains node_modules: {forbidden[:5]}"'

[testenv:lint]
skipsdist = true
skip_install = true
deps =
    ruff
commands =
    ruff check {posargs}

[testenv:release]
passenv =
    TWINE_USERNAME
    TWINE_PASSWORD
deps =
    twine
commands =
    twine check {distdir}/*
    twine upload --skip-existing {distdir}/*

[pytest]
addopts = --verbose --strict --showlocals
testpaths = tests
